{{ $id := .Get "id" | default "pwd" }}

<div class="tool-container" id="{{ $id }}-tool">
    <div class="tool-workspace">
        <!-- 1. 结果显示区 -->
        <div class="tool-output-group">
            <div class="result-bar">
                <input type="text" id="{{ $id }}-input" readonly 
                       placeholder='{{ i18n "pwd_input_placeholder" | default "Click Generate" }}' 
                       class="tool-text-input">
                <button id="{{ $id }}-copy" class="btn-icon" title='{{ i18n "btn_copy" | default "Copy" }}'>📋</button>
            </div>
            <div class="strength-meter">
                <div id="{{ $id }}-bar" class="strength-bar"></div>
            </div>
            <div id="{{ $id }}-text" class="tool-status">
                {{ i18n "pwd_status_waiting" | default "Waiting..." }}
            </div>
        </div>

        <!-- 2. 生成器配置面板 -->
        <div class="generator-panel">
            <h4>⚙️ {{ i18n "pwd_config_title" }}</h4>
            
            <!-- 总长度 -->
            <div class="config-row">
                <label>
                    {{ i18n "pwd_config_length" }}: 
                    <span id="{{ $id }}-len-val" class="badge">15</span>
                </label>
                <input type="range" id="{{ $id }}-len" min="4" max="64" value="15" class="tool-slider">
            </div>

            <div class="config-grid">
                <!-- 小写字母 -->
                <div class="config-item">
                    <label>
                        {{ i18n "pwd_config_lower" }} 
                        <span class="range-display" id="{{ $id }}-lower-display">1-2</span>
                    </label>
                    <div class="range-control">
                        <input type="range" class="mini-slider min-input" data-type="lower" data-target="min" min="0" max="20" value="1">
                        <span class="sep">至</span>
                        <input type="range" class="mini-slider max-input" data-type="lower" data-target="max" min="0" max="20" value="2">
                    </div>
                </div>

                <!-- 大写字母 -->
                <div class="config-item">
                    <label>
                        {{ i18n "pwd_config_upper" }} 
                        <span class="range-display" id="{{ $id }}-upper-display">1-2</span>
                    </label>
                    <div class="range-control">
                        <input type="range" class="mini-slider min-input" data-type="upper" data-target="min" min="0" max="20" value="1">
                        <span class="sep">至</span>
                        <input type="range" class="mini-slider max-input" data-type="upper" data-target="max" min="0" max="20" value="2">
                    </div>
                </div>

                <!-- 数字 -->
                <div class="config-item">
                    <label>
                        {{ i18n "pwd_config_number" }} 
                        <span class="range-display" id="{{ $id }}-num-display">0-16</span>
                    </label>
                    <div class="range-control">
                        <input type="range" class="mini-slider min-input" data-type="number" data-target="min" min="0" max="20" value="0">
                        <span class="sep">至</span>
                        <input type="range" class="mini-slider max-input" data-type="number" data-target="max" min="0" max="20" value="16">
                    </div>
                </div>

                <!-- 符号 -->
                <div class="config-item">
                    <label>
                        {{ i18n "pwd_config_symbol" }} 
                        <span class="range-display" id="{{ $id }}-sym-display">0-0</span>
                    </label>
                    <div class="range-control">
                        <input type="range" class="mini-slider min-input" data-type="symbol" data-target="min" min="0" max="20" value="0">
                        <span class="sep">至</span>
                        <input type="range" class="mini-slider max-input" data-type="symbol" data-target="max" min="0" max="20" value="0">
                    </div>
                </div>
            </div>
            
            <button id="{{ $id }}-generate" class="btn-primary full-width">
                🎲 {{ i18n "pwd_btn_generate" }}
            </button>
            <div id="{{ $id }}-error" class="error-msg"></div>
        </div>

        <!-- 3. 强度分析详情 -->
        <div id="{{ $id }}-info" class="tool-info" style="display: none;">
            <div class="tool-stats">
                <span>{{ i18n "pwd_stat_entropy" }}:</span> 
                <strong><span id="{{ $id }}-entropy">0</span> {{ i18n "pwd_stat_bits" }}</strong>
            </div>
            <div class="tool-checklist">
                <ul id="{{ $id }}-checklist"></ul>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // 1. 初始化变量与 DOM 元素
    const container = document.getElementById('{{ $id }}-tool');
    if (!container) return;

    const types = ['lower', 'upper', 'number', 'symbol'];
    const inputs = {
        totalLen: document.getElementById('{{ $id }}-len'),
        lenVal: document.getElementById('{{ $id }}-len-val'),
        minInputs: container.querySelectorAll('.min-input'),
        maxInputs: container.querySelectorAll('.max-input'),
        displays: {
            lower: document.getElementById('{{ $id }}-lower-display'),
            upper: document.getElementById('{{ $id }}-upper-display'),
            number: document.getElementById('{{ $id }}-num-display'),
            symbol: document.getElementById('{{ $id }}-sym-display')
        }
    };

    // 2. 核心逻辑：滑块联动与约束
    function updateConstraints(changedType, target) {
        const totalLen = parseInt(inputs.totalLen.value);
        
        // 计算其他类型的最小值之和
        let otherMins = 0;
        types.forEach(t => {
            if (t !== changedType) {
                const minVal = parseInt(container.querySelector(`.min-input[data-type="${t}"]`).value);
                otherMins += minVal;
            }
        });

        types.forEach(type => {
            const minSlider = container.querySelector(`.min-input[data-type="${type}"]`);
            const maxSlider = container.querySelector(`.max-input[data-type="${type}"]`);
            const display = inputs.displays[type];

            let currentMin = parseInt(minSlider.value);
            let currentMax = parseInt(maxSlider.value);

            // --- 规则 1: 最小值不能大于最大值 ---
            if (target === 'min' && type === changedType) {
                if (currentMin > currentMax) {
                    maxSlider.value = currentMin; // 强制拉大最大值
                    currentMax = currentMin;
                }
            }
            if (target === 'max' && type === changedType) {
                if (currentMax < currentMin) {
                    minSlider.value = currentMax; // 强制拉小最小值
                    currentMin = currentMax;
                }
            }

            // --- 规则 2: 最大值不能超过 (总长度 - 其他最小值之和) ---
            // 这意味着当前类型的最大值上限，受限于总长度和其他类型的“保底”数量
            const maxLimit = Math.max(currentMin, totalLen - otherMins);
            
            // 更新滑块的 max 属性 (HTML 属性)
            maxSlider.max = maxLimit;
            
            // 如果当前的滑块值超出了新的限制，强制修正
            if (parseInt(maxSlider.value) > maxLimit) {
                maxSlider.value = maxLimit;
                currentMax = maxLimit;
            }

            // --- 更新界面显示的文本 (例如 "1 - 5") ---
            display.textContent = `${currentMin}-${currentMax}`;
        });
    }

    // 3. 绑定事件监听
    inputs.totalLen.addEventListener('input', () => {
        inputs.lenVal.textContent = inputs.totalLen.value;
        updateConstraints('all', 'total'); // 总长度变化，触发全局检查
    });

    inputs.minInputs.forEach(input => {
        input.addEventListener('input', () => {
            updateConstraints(input.dataset.type, 'min');
        });
    });

    inputs.maxInputs.forEach(input => {
        input.addEventListener('input', () => {
            updateConstraints(input.dataset.type, 'max');
        });
    });

    // 初始化一次显示
    updateConstraints('all', 'init');

    // --- 以下保留原有的生成逻辑 ---
    
    const input = document.getElementById('{{ $id }}-input');
    const bar = document.getElementById('{{ $id }}-bar');
    const text = document.getElementById('{{ $id }}-text');
    const entropyVal = document.getElementById('{{ $id }}-entropy');
    const infoPanel = document.getElementById('{{ $id }}-info');
    const checklist = document.getElementById('{{ $id }}-checklist');
    const errorMsg = document.getElementById('{{ $id }}-error');
    const genBtn = document.getElementById('{{ $id }}-generate');
    const copyBtn = document.getElementById('{{ $id }}-copy');

    const chars = {
        lower: 'abcdefghijklmnopqrstuvwxyz',
        upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        number: '0123456789',
        symbol: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };

    function calculateEntropy(pwd) {
        if (!pwd) return 0;
        let pool = 0;
        if (/[a-z]/.test(pwd)) pool += 26;
        if (/[A-Z]/.test(pwd)) pool += 26;
        if (/[0-9]/.test(pwd)) pool += 10;
        if (/[^a-zA-Z0-9]/.test(pwd)) pool += 32;
        return Math.floor(pwd.length * Math.log2(pool || 1));
    }

    function updateStrengthUI(pwd, actualStats = null) {
        const entropy = calculateEntropy(pwd);
        entropyVal.textContent = entropy;

        let statusClass = '';
        if (entropy < 28) { statusClass = 'weak'; text.textContent = '🔴 太弱'; }
        else if (entropy < 40) { statusClass = 'medium'; text.textContent = '🟠 一般'; }
        else if (entropy < 60) { statusClass = 'strong'; text.textContent = '🟢 强壮'; }
        else { statusClass = 'secure'; text.textContent = '🔵 非常强壮'; }

        bar.className = `strength-bar ${statusClass}`;
        text.className = `tool-status ${statusClass}`;

        if (!actualStats || pwd.length === 0) {
            checklist.innerHTML = `<li>请输入或生成密码</li>`;
            infoPanel.style.display = 'none';
            return;
        }

        const items = [
            { label: '总长度', count: pwd.length, required: true },
            { label: '小写字母', count: actualStats.lower, required: actualStats.lower > 0 },
            { label: '大写字母', count: actualStats.upper, required: actualStats.upper > 0 },
            { label: '数字', count: actualStats.number, required: actualStats.number > 0 },
            { label: '特殊符号', count: actualStats.symbol, required: actualStats.symbol > 0 }
        ];

        checklist.innerHTML = items.map(item => {
            const statusIcon = item.required ? '✅' : '❌';
            return `<li class="check-item ${item.required ? 'pass' : 'fail'}">
                <span class="icon">${statusIcon}</span>
                <span class="label">${item.label}</span>
                <span class="count-badge">${item.count}</span>
            </li>`;
        }).join('');

        infoPanel.style.display = 'block';
    }

    function generatePassword() {
        errorMsg.textContent = '';
        const totalLen = parseInt(inputs.totalLen.value);
        
        // 获取当前的配置值
        const config = {};
        types.forEach(t => {
            config[t] = {
                min: parseInt(container.querySelector(`.min-input[data-type="${t}"]`).value),
                max: parseInt(container.querySelector(`.max-input[data-type="${t}"]`).value)
            };
        });

        // 校验总和
        const minRequired = config.lower.min + config.upper.min + config.number.min + config.symbol.min;
        if (minRequired > totalLen) {
            errorMsg.textContent = `❌ 错误：各项最小数量之和 (${minRequired}) 超过了总长度 (${totalLen})！`;
            return;
        }

        let passwordChars = [];
        let actualStats = { lower: 0, upper: 0, number: 0, symbol: 0 };

        // 1. 强制加入最小值
        const addChars = (type, count) => {
            for(let i=0; i<count; i++) {
                passwordChars.push(chars[type].charAt(Math.floor(Math.random() * chars[type].length)));
            }
            actualStats[type] += count;
        };

        addChars('lower', config.lower.min);
        addChars('upper', config.upper.min);
        addChars('number', config.number.min);
        addChars('symbol', config.symbol.min);

        // 2. 随机填充剩余长度
        while (passwordChars.length < totalLen) {
            const currentCounts = { ...actualStats };
            const type = types[Math.floor(Math.random() * types.length)];
            
            if (currentCounts[type] < config[type].max) {
                passwordChars.push(chars[type].charAt(Math.floor(Math.random() * chars[type].length)));
                actualStats[type]++;
            } else {
                // 如果所有类型都满了，回退到小写
                passwordChars.push(chars.lower.charAt(Math.floor(Math.random() * chars.lower.length)));
                actualStats.lower++;
            }
        }

        // 3. 洗牌
        for (let i = passwordChars.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [passwordChars[i], passwordChars[j]] = [passwordChars[j], passwordChars[i]];
        }

        const finalPwd = passwordChars.join('');
        input.value = finalPwd;
        updateStrengthUI(finalPwd, actualStats);
    }

    genBtn.addEventListener('click', generatePassword);
    copyBtn.addEventListener('click', () => {
        if(!input.value) return;
        navigator.clipboard.writeText(input.value).then(() => {
            copyBtn.textContent = '✅';
            setTimeout(() => copyBtn.textContent = '📋', 1500);
        });
    });

    generatePassword();
})();
</script>

<style>
/* 基础样式 */
.tool-container { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
.tool-text-input { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; }
.btn-primary { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 15px; }
.config-row { margin-bottom: 15px; }
.tool-slider { width: 100%; }
.config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.config-item { font-size: 14px; }
.range-control { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
.mini-slider { flex: 1; }
.sep { font-size: 12px; color: #666; }
.badge { background: #eee; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
.range-display { float: right; font-weight: bold; color: #007bff; font-size: 12px; }

/* 结果列表样式 */
.check-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #eee; }
.check-item .icon { width: 20px; }
.check-item .label { flex: 1; }
.check-item .count-badge { background: #eee; padding: 0 6px; border-radius: 10px; font-family: monospace; min-width: 24px; text-align: center; }
.check-item.pass { color: #059669; }
.check-item.fail { color: #dc2626; }
.error-msg { color: red; font-size: 12px; margin-top: 5px; }
</style>
