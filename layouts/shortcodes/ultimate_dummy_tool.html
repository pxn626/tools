{{ $id := .Get "id" | default "ultimatedummy" }}
<div class="tool-container" id="{{ $id }}-tool">
    <div class="tool-header">
        <h3>{{ i18n "ultimate_dummy_title" }}</h3>
        <p class="tool-desc">{{ i18n "ultimate_dummy_desc" }}</p>
    </div>

    <div class="tool-workspace">
        <!-- з¬¬дёҖзә§пјҡеӨ§зұ»йҖүжӢ© -->
        <div class="tool-select-group">
            <label for="{{ $id }}-category">{{ i18n "dummy_category" }}</label>
            <select id="{{ $id }}-category" class="tool-select">
                <option value="en_theme">{{ i18n "cat_en_theme" }}</option>
                <option value="zh_classical">{{ i18n "cat_zh_classical" }}</option>
                <option value="zh_modern">{{ i18n "cat_zh_modern" }}</option>
                <option value="functional">{{ i18n "cat_functional" }}</option>
            </select>
        </div>

        <!-- з¬¬дәҢзә§пјҡе…·дҪ“йЈҺж јйҖүжӢ© -->
        <div class="tool-select-group">
            <label for="{{ $id }}-style">{{ i18n "dummy_style" }}</label>
            <select id="{{ $id }}-style" class="tool-select">
                <!-- еҠЁжҖҒеЎ«е…… -->
            </select>
        </div>

        <div class="tool-options">
            <div class="option-item">
                <input type="radio" id="{{ $id }}-para" name="{{ $id }}-mode" value="para" checked>
                <label for="{{ $id }}-para">{{ i18n "lorem_paragraphs" }}</label>
            </div>
            <div class="option-item">
                <input type="radio" id="{{ $id }}-sent" name="{{ $id }}-mode" value="sent">
                <label for="{{ $id }}-sent">{{ i18n "lorem_sentences" }}</label>
            </div>
            <div class="option-item">
                <input type="radio" id="{{ $id }}-word" name="{{ $id }}-mode" value="word">
                <label for="{{ $id }}-word">{{ i18n "lorem_words" }}</label>
            </div>
        </div>

        <div class="tool-input-group">
            <label for="{{ $id }}-count">{{ i18n "lorem_quantity" }}</label>
            <input type="number" id="{{ $id }}-count" value="3" min="1" max="100" class="tool-number-input">
        </div>

        <div class="tool-actions">
            <button id="{{ $id }}-generate" class="btn-primary">{{ i18n "btn_generate" }}</button>
            <button id="{{ $id }}-copy" class="btn-secondary">{{ i18n "btn_copy" }}</button>
            <button id="{{ $id }}-clear" class="btn-secondary">{{ i18n "btn_clear" }}</button>
        </div>

        <div class="tool-output-group">
            <label for="{{ $id }}-output">{{ i18n "label_result" }}</label>
            <textarea id="{{ $id }}-output" readonly placeholder="{{ i18n "lorem_output_ph" }}"></textarea>
        </div>
        
        <div id="{{ $id }}-status" class="tool-status"></div>
    </div>
</div>

<style>
.tool-container { background: var(--code-bg); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border); margin: 1rem 0; }
.tool-header { margin-bottom: 1rem; }
.tool-header h3 { margin: 0 0 0.5rem 0; color: var(--primary); }
.tool-desc { margin: 0; font-size: 0.9rem; color: var(--secondary); }
.tool-workspace { display: flex; flex-direction: column; gap: 1rem; }
.tool-select-group { display: flex; flex-direction: column; gap: 0.5rem; }
.tool-select-group label { font-weight: bold; font-size: 0.9rem; }
.tool-select { padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; background: var(--entry); color: var(--primary); font-family: inherit; box-sizing: border-box; }
.tool-select:focus { outline: 2px solid var(--primary); border-color: transparent; }
.tool-options { display: flex; flex-wrap: wrap; gap: 1rem; background: var(--entry); padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); }
.option-item { display: flex; align-items: center; gap: 0.3rem; }
.tool-input-group { display: flex; flex-direction: column; gap: 0.5rem; }
.tool-input-group label { font-weight: bold; font-size: 0.9rem; }
.tool-number-input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; background: var(--entry); color: var(--primary); font-family: monospace; box-sizing: border-box; }
.tool-number-input:focus { outline: 2px solid var(--primary); border-color: transparent; }
.tool-actions { display: flex; gap: 0.5rem; }
.btn-primary, .btn-secondary { padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
.btn-primary { background: var(--primary); color: var(--code-bg); }
.btn-secondary { background: var(--border); color: var(--primary); }
.btn-primary:hover, .btn-secondary:hover { opacity: 0.8; }
.tool-output-group { display: flex; flex-direction: column; gap: 0.5rem; }
.tool-output-group label { font-weight: bold; font-size: 0.9rem; }
textarea { width: 100%; min-height: 150px; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; background: var(--entry); color: var(--primary); font-family: monospace; resize: vertical; box-sizing: border-box; }
textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
.tool-status { font-size: 0.85rem; min-height: 1.2em; }
.status-error { color: #ff4d4f; }
.status-success { color: #52c41a; }
</style>

<script>
(function() {
    const container = document.getElementById('{{ $id }}-tool');
    const output = document.getElementById('{{ $id }}-output');
    const countInput = document.getElementById('{{ $id }}-count');
    const categorySelect = document.getElementById('{{ $id }}-category');
    const styleSelect = document.getElementById('{{ $id }}-style');
    const generateBtn = document.getElementById('{{ $id }}-generate');
    const copyBtn = document.getElementById('{{ $id }}-copy');
    const clearBtn = document.getElementById('{{ $id }}-clear');
    const status = document.getElementById('{{ $id }}-status');

    // --- иҜҚеә“е®ҡд№ү ---
    
    // 1. иӢұж–Үдё»йўҳиҜҚеә“
    const enThemes = {
        food: ['bacon', 'ipsum', 'dolor', 'meatball', 'sirloin', 'pancetta', 'salami', 'brisket', 'cupcake', 'jelly', 'sweet', 'roll', 'chocolate', 'candy', 'cotton', 'cake', 'pie', 'fruit', 'danish', 'muffin', 'donut'],
        corporate: ['synergy', 'ipsum', 'dolor', 'leverage', 'agile', 'paradigm', 'scalable', 'bandwidth', 'strategic', 'initiative', 'holistic', 'empower', 'visionary', 'collaboration', 'backend', 'solution', 'disruptive', 'innovative', 'streamline', 'proactive'],
        tech: ['lorem', 'ipsum', 'dolor', 'algorithm', 'api', 'array', 'binary', 'bit', 'byte', 'cache', 'cloud', 'compile', 'cpu', 'cyber', 'data', 'database', 'debug', 'digital', 'dns', 'encryption', 'ethernet', 'firewall', 'framework', 'git', 'github', 'gpu', 'hacker', 'html', 'javascript', 'json'],
        hipster: ['artisan', 'ipsum', 'dolor', 'brooklyn', 'vaporware', 'etsy', 'pabst', 'authentic', 'next', 'level', 'seitan', 'locavore', 'cornhole', 'selvage', 'neutra', 'forage', 'ethical', 'food', 'truck', 'pbr&b', 'tote', 'bag', 'portland', 'shabby', 'chic']
    };

    // 2. дёӯж–ҮеҸӨе…ёиҜҚеә“ (еҸҘеӯҗеә“)
    const zhClassicalSentences = [
        "еӯҗжӣ°еӯҰиҖҢж—¶д№ д№ӢдёҚдәҰиҜҙд№Һ", "жңүжңӢиҮӘиҝңж–№жқҘдёҚдәҰд№җд№Һ", "дәәдёҚзҹҘиҖҢдёҚж„ дёҚдәҰеҗӣеӯҗд№Һ",
        "е…іе…ійӣҺйё еңЁжІід№ӢжҙІ", "зӘҲзӘ•ж·‘еҘіеҗӣеӯҗеҘҪйҖ‘", "еҸӮе·®иҚҮиҸңе·ҰеҸіжөҒд№Ӣ",
        "жҳ”жҲ‘еҫҖзҹЈжқЁжҹідҫқдҫқ", "д»ҠжҲ‘жқҘжҖқйӣЁйӣӘйңҸйңҸ", "иЎҢйҒ“иҝҹиҝҹиҪҪжёҙиҪҪйҘҘ",
        "еӨ§еӯҰд№ӢйҒ“еңЁжҳҺжҳҺеҫ·", "еңЁдәІж°‘еңЁжӯўдәҺиҮіе–„", "зҹҘжӯўиҖҢеҗҺжңүе®ҡ",
        "еӨ©иЎҢеҒҘеҗӣеӯҗд»ҘиҮӘејәдёҚжҒҜ", "ең°еҠҝеқӨеҗӣеӯҗд»ҘеҺҡеҫ·иҪҪзү©",
        "йҒ“еҸҜйҒ“йқһеёёйҒ“", "еҗҚеҸҜеҗҚйқһеёёеҗҚ", "ж— еҗҚеӨ©ең°д№Ӣе§Ӣ", "жңүеҗҚдёҮзү©д№ӢжҜҚ",
        "ж•…еёёж— ж¬Ід»Ҙи§Ӯе…¶еҰҷ", "еёёжңүж¬Ід»Ҙи§Ӯе…¶еҫј"
    ];

    // 3. дёӯж–ҮзҺ°д»ЈеәҹиҜқиҜҚеә“ (еҸҘеӯҗеә“ - иҒҢеңә/еӯҰжңҜ/ж–°й—»йЈҺ)
    const zhModernSentences = [
        "жҲ‘д»¬йңҖиҰҒд»ҺеӨҡдёӘз»ҙеәҰеҜ№иҝҷдёҖзҺ°иұЎиҝӣиЎҢж·ұеәҰзҡ„еү–жһҗе’Ңи§ЈиҜ»",
        "еңЁеҪ“еүҚзҡ„е®Ҹи§ӮзҺҜеўғдёӢпјҢеҰӮдҪ•жҠҠжҸЎеә•еұӮйҖ»иҫ‘жҳҜи§ЈеҶій—®йўҳзҡ„е…ій”®",
        "йҖҡиҝҮжӢүйҖҡеҜ№йҪҗйў—зІ’еәҰпјҢжҲ‘д»¬иғҪеӨҹжӣҙеҘҪең°иөӢиғҪдёҡеҠЎеңәжҷҜ",
        "иҝҷдёҖдёҫжҺӘж—ЁеңЁжү“йҖҡз«ҜеҲ°з«Ҝзҡ„жөҒзЁӢпјҢе®һзҺ°д»·еҖјй—ӯзҺҜ",
        "е…ідәҺиҝҷдёӘй—®йўҳпјҢжҲ‘д»¬йңҖиҰҒеҪўжҲҗдёҖеҘ—з»„еҗҲжӢіпјҢжү“еҮәе·®ејӮеҢ–",
        "жҲ‘д»¬иҰҒеқҡжҢҒй•ҝжңҹдё»д№үпјҢеңЁдёҚзЎ®е®ҡзҡ„зҺҜеўғдёӯеҜ»жүҫзЎ®е®ҡжҖ§",
        "йҖҡиҝҮеӨҚзӣҳе’Ңиҝӯд»ЈпјҢдёҚж–ӯдјҳеҢ–жҲ‘д»¬зҡ„ж–№жі•и®ә",
        "иҝҷжҳҜдёҖдёӘе…ёеһӢзҡ„йҖҡиҝҮжҠҖжңҜжүӢж®өи§ЈеҶідёҡеҠЎз—ӣзӮ№зҡ„жЎҲдҫӢ",
        "жҲ‘д»¬иҰҒе……еҲҶеҲ©з”ЁзҺ°жңүзҡ„иө„жәҗзҰҖиөӢпјҢе®һзҺ°йҷҚжң¬еўһж•Ҳ",
        "жңҖз»ҲжҲ‘д»¬иҰҒиҫҫеҲ°зҡ„ж•ҲжһңжҳҜз”ЁжҲ·еҝғжҷәзҡ„еҚ йўҶе’ҢеёӮеңәд»Ҫйўқзҡ„жү©еј "
    ];

    // 4. еҠҹиғҪеһӢиҜҚеә“
    const functionalThemes = {
        long_words: ["Pneumonoultramicroscopicsilicovolcanoconiosis", "Supercalifragilisticexpialidocious", "Hippopotomonstrosesquippedaliophobia", "Floccinaucinihilipilification", "Antidisestablishmentarianism", "Honorable", "Incomprehensibilities"],
        emoji: ["рҹҚ”рҹҚҹрҹҚ•рҹҢӯрҹҚҝрҹҘ“рҹҘҡрҹҘһрҹ§ҮрҹҘҗрҹҘЁрҹҘҜрҹҘӘ", "рҹҳҖрҹҳғрҹҳ„рҹҳҒрҹҳҶрҹҳ…рҹҳӮрҹӨЈрҹҘІрҹҘ№вҳәпёҸрҹҳҠрҹҳҮрҹҷӮрҹҷғрҹҳүрҹҳҢрҹҳҚрҹҘ°рҹҳҳрҹҳ—рҹҳҷрҹҳҡрҹҳӢрҹҳӣ", "рҹҡ—рҹҡ•рҹҡҷрҹҡҢрҹҡҺрҹҸҺпёҸрҹҡ“рҹҡ‘рҹҡ’рҹҡҗрҹҡҡрҹҡӣрҹҡңрҹӣҙрҹҡІрҹӣөрҹҸҚпёҸ", "рҹҗ¶рҹҗұрҹҗӯрҹҗ№рҹҗ°рҹҰҠрҹҗ»рҹҗјрҹҗЁрҹҗҜрҹҰҒрҹҗ®рҹҗ·рҹҗҪрҹҗёрҹҗөрҹҷҲрҹҷүрҹҷҠрҹҗ’"],
        ecommerce: ["зҲҶж¬ҫжҺЁиҚҗ", "йҷҗж—¶жҠўиҙӯ", "е…ЁзҪ‘жңҖдҪҺ", "жӯЈе“ҒдҝқиҜҒ", "жһҒйҖҹеҸ‘иҙ§", "дёғеӨ©ж— зҗҶз”ұйҖҖжҚў", "д№°дёҖйҖҒдёҖ", "е№ҙз»ҲеӨ§дҝғ", "дәҸжң¬еҶІйҮҸ", "жңҖеҗҺдёүеӨ©", "жүӢж…ўж— ", "еҘҪиҜ„иҝ”зҺ°", "ж»ЎеҮҸдјҳжғ ", "еҲёеҗҺд»·жӣҙдҪҺ"]
    };

    // --- иҫ…еҠ©еҮҪж•° ---

    // жӣҙж–°дәҢзә§иҸңеҚ•
    function updateStyleOptions() {
        const category = categorySelect.value;
        styleSelect.innerHTML = ''; // жё…з©ә

        let options = [];
        if (category === 'en_theme') {
            options = [
                {val: 'food', text: 'зҫҺйЈҹ (Food)'},
                {val: 'corporate', text: 'е•ҶеҠЎ (Corporate)'},
                {val: 'tech', text: 'з§‘жҠҖ (Tech)'},
                {val: 'hipster', text: 'жҪ®дәә (Hipster)'}
            ];
        } else if (category === 'zh_classical') {
            options = [{val: 'classical', text: 'еҸӨе…ёиҜ—иҜҚ (Classical)'}];
        } else if (category === 'zh_modern') {
            options = [{val: 'modern', text: 'зҺ°д»ЈеәҹиҜқ (Modern Nonsense)'}];
        } else if (category === 'functional') {
            options = [
                {val: 'long_words', text: 'й•ҝеҚ•иҜҚжөӢиҜ• (Long Words)'},
                {val: 'emoji', text: 'Emoji иЎЁжғ… (Emoji)'},
                {val: 'ecommerce', text: 'з”өе•Ҷж–ҮжЎҲ (E-commerce)'}
            ];
        }

        options.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt.val;
            el.textContent = opt.text;
            styleSelect.appendChild(el);
        });
    }

    // иҺ·еҸ–еҪ“еүҚйҖүдёӯзҡ„иҜҚеә“
    function getCurrentWordList() {
        const category = categorySelect.value;
        const style = styleSelect.value;

        if (category === 'en_theme') return enThemes[style];
        if (category === 'functional') return functionalThemes[style];
        return []; // дёӯж–Үиө°еҸҘеӯҗйҖ»иҫ‘
    }

    // иҺ·еҸ–дёӯж–ҮеҸҘеӯҗ
    function getChineseSentencePool() {
        const category = categorySelect.value;
        if (category === 'zh_classical') return zhClassicalSentences;
        if (category === 'zh_modern') return zhModernSentences;
        return [];
    }

    // з”ҹжҲҗеҸҘеӯҗ (йҖҡз”Ё)
    function generateSentence(wordList, isChinese) {
        if (isChinese) {
            // дёӯж–ҮйҖ»иҫ‘пјҡзӣҙжҺҘд»ҺеҸҘеӯҗеә“йҡҸжңәеҸ–дёҖеҸҘ
            const pool = getChineseSentencePool();
            return pool[Math.floor(Math.random() * pool.length)] + "гҖӮ";
        } else {
            // иӢұж–Ү/еҠҹиғҪйҖ»иҫ‘пјҡеҚ•иҜҚжӢјжҺҘ
            const len = Math.floor(Math.random() * 8) + 4; // 4-12дёӘеҚ•иҜҚ
            let sentence = [];
            for (let i = 0; i < len; i++) {
                sentence.push(wordList[Math.floor(Math.random() * wordList.length)]);
            }
            // йҰ–еӯ—жҜҚеӨ§еҶҷ (д»…иӢұж–Ү)
            let text = sentence.join(' ');
            return text.charAt(0).toUpperCase() + text.slice(1) + '.';
        }
    }

    // з”ҹжҲҗж®өиҗҪ (йҖҡз”Ё)
    function generateParagraph(wordList, isChinese) {
        const sentCount = Math.floor(Math.random() * 3) + 2; // 2-4дёӘеҸҘеӯҗ
        let para = [];
        for (let i = 0; i < sentCount; i++) {
            para.push(generateSentence(wordList, isChinese));
        }
        return para.join(isChinese ? "" : " "); // дёӯж–ҮеҸҘеӯҗй—ҙдёҚйңҖиҰҒз©әж ј
    }

    // з”ҹжҲҗеҚ•иҜҚ/зҹӯиҜӯжөҒ
    function generateWords(wordList, count, isChinese) {
        let result = [];
        for (let i = 0; i < count; i++) {
            result.push(wordList[Math.floor(Math.random() * wordList.length)]);
        }
        // дёӯж–Үз”Ёз©әж јйҡ”ејҖж–№дҫҝйҳ…иҜ»пјҢиӢұж–ҮиҮӘеёҰз©әж ј
        return result.join(isChinese ? " " : " ");
    }

    // --- дәӢд»¶зӣ‘еҗ¬ ---

    generateBtn.addEventListener('click', () => {
        const category = categorySelect.value;
        const mode = container.querySelector(`input[name="{{ $id }}-mode"]:checked`).value;
        const count = parseInt(countInput.value) || 1;
        
        // еҲӨж–ӯжҳҜеҗҰдёәдёӯж–ҮжЁЎејҸ
        const isChinese = (category === 'zh_classical' || category === 'zh_modern');
        // иҺ·еҸ–иҜҚеә“ (дёӯж–ҮжЁЎејҸдёӢжӯӨеҸҳйҮҸд»…з”ЁдәҺеҚ дҪҚпјҢе®һйҷ…иө°еҸҘеӯҗеә“йҖ»иҫ‘)
        const wordList = getCurrentWordList();

        let result = '';

        if (mode === 'para') {
            for (let i = 0; i < count; i++) {
                result += generateParagraph(wordList, isChinese);
                if (i < count - 1) result += '\n\n';
            }
        } else if (mode === 'sent') {
            for (let i = 0; i < count; i++) {
                result += generateSentence(wordList, isChinese);
                if (i < count - 1) result += (isChinese ? "" : " ");
            }
        } else if (mode === 'word') {
            result = generateWords(wordList, count, isChinese);
        }

        output.value = result;
        status.textContent = '{{ i18n "msg_success" }}';
        status.className = 'tool-status status-success';
    });

    copyBtn.addEventListener('click', () => {
        if (!output.value) {
            status.textContent = '{{ i18n "msg_input_required" }}';
            status.className = 'tool-status status-error';
            return;
        }
        output.select();
        document.execCommand('copy');
        status.textContent = '{{ i18n "msg_copied" }}';
        status.className = 'tool-status status-success';
    });

    clearBtn.addEventListener('click', () => {
        output.value = '';
        status.textContent = '';
        status.className = 'tool-status';
    });

    // еҲқе§ӢеҢ–иҸңеҚ•
    updateStyleOptions();
    categorySelect.addEventListener('change', updateStyleOptions);

})();
</script>
