    <script>
    (function () {
        'use strict';

        // ===== 工具常量 =====
        var WEEKDAY_NAMES = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        var MONTH_NAMES = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
        var FIELD_RANGES = [
            { name: 'minute', min: 0, max: 59 },
            { name: 'hour',   min: 0, max: 23 },
            { name: 'day',    min: 1, max: 31 },
            { name: 'month',  min: 1, max: 12 },
            { name: 'weekday',min: 0, max: 6  }
        ];

        // ===== DOM =====
        var root = document.querySelector('.ceg-tool');
        if (!root) return;

        var inputEl = root.querySelector('#ceg-input');
        var parseBtn = root.querySelector('#ceg-parse-btn');
        var copyBtn = root.querySelector('#ceg-copy-btn');
        var clearBtn = root.querySelector('#ceg-clear-btn');
        var errorEl = root.querySelector('#ceg-error');
        var resultEl = root.querySelector('#ceg-result');
        var descEl = root.querySelector('#ceg-description');
        var nextListEl = root.querySelector('#ceg-next-list');
        var presetCards = root.querySelectorAll('.ceg-preset-card');
        var chips = root.querySelectorAll('.ceg-chip');

        // ===== 解析单个字段 =====
        // 返回 Set<number>;失败抛 Error
        function parseField(raw, min, max) {
            raw = String(raw).trim();
            if (raw === '') {
                throw new Error('字段不能为空');
            }
            var result = new Set();
            var parts = raw.split(',');
            for (var i = 0; i < parts.length; i++) {
                var part = parts[i].trim();
                if (part === '') {
                    throw new Error('列表中存在空段');
                }

                var stepMatch = part.match(/^(.+)\/(\d+)$/);
                var stepStr = null;
                var baseRange = part;

                if (stepMatch) {
                    baseRange = stepMatch[1].trim();
                    stepStr = parseInt(stepMatch[2], 10);
                    if (stepStr <= 0 || isNaN(stepStr)) {
                        throw new Error('步进值必须 > 0: ' + part);
                    }
                }

                var start, end;
                // 在去掉步进后,baseRange 可能是 "*"、"N" 或 "N-M"
                var rangeInBase = baseRange.match(/^(\d+)-(\d+)$/);
                if (baseRange === '*') {
                    start = min; end = max;
                } else if (rangeInBase) {
                    start = parseInt(rangeInBase[1], 10);
                    end = parseInt(rangeInBase[2], 10);
                    if (isNaN(start) || isNaN(end) || start > end) {
                        throw new Error('范围非法: ' + part);
                    }
                } else {
                    var single = parseInt(baseRange, 10);
                    if (isNaN(single)) {
                        throw new Error('非法值: ' + part);
                    }
                    start = single;
                    // N/N 这种语法(N 带步进)语义模糊,这里保守按"从 N 到 max 步进"
                    end = (stepStr != null) ? max : single;
                }

                if (start < min || end > max) {
                    throw new Error('值超出范围 [' + min + '-' + max + ']: ' + part);
                }

                if (stepStr == null) {
                    for (var v = start; v <= end; v++) result.add(v);
                } else {
                    for (var w = start; w <= end; w += stepStr) result.add(w);
                }
            }
            return result;
        }

        // ===== 校验整段 cron =====
        function validateCron(cronStr) {
            var s = String(cronStr || '').trim();
            if (s === '') {
                return { ok: false, error: '请输入 Cron 表达式' };
            }
            // 标准 5 字段;允许中间多余空白
            var parts = s.split(/\s+/);
            if (parts.length !== 5) {
                return {
                    ok: false,
                    error: '需要 5 个字段(分 时 日 月 周),当前为 ' + parts.length + ' 个'
                };
            }
            try {
                var fields = [];
                for (var i = 0; i < 5; i++) {
                    var r = FIELD_RANGES[i];
                    fields.push(parseField(parts[i], r.min, r.max));
                }
                return { ok: true, fields: fields, parts: parts };
            } catch (e) {
                return { ok: false, error: '解析失败: ' + e.message };
            }
        }

        // ===== 计算未来 N 次执行时间 =====
        function getNextRuns(fields, count) {
            var minutes  = fields[0];
            var hours    = fields[1];
            var days     = fields[2];
            var months   = fields[3];
            var weekdays = fields[4];

            var runs = [];
            // 从下一分钟开始扫描
            var d = new Date();
            d.setSeconds(0, 0);
            d.setMinutes(d.getMinutes() + 1);

            // 安全上限:扫描 366 天
            var safety = 366 * 24 * 60;

            while (runs.length < count && safety-- > 0) {
                var mon = d.getMonth() + 1;
                var day = d.getDate();
                var wd = d.getDay();
                var hr = d.getHours();
                var mn = d.getMinutes();

                if (months.has(mon) &&
                    days.has(day) &&
                    hours.has(hr) &&
                    minutes.has(mn) &&
                    weekdays.has(wd)) {
                    runs.push(new Date(d));
                }
                d.setMinutes(d.getMinutes() + 1);
            }
            return runs;
        }

        // ===== 格式化时间 =====
        function formatDate(d) {
            var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
            var y = d.getFullYear();
            var M = pad(d.getMonth() + 1);
            var D = pad(d.getDate());
            var h = pad(d.getHours());
            var m = pad(d.getMinutes());
            var wd = WEEKDAY_NAMES[d.getDay()];
            return y + '-' + M + '-' + D + ' ' + h + ':' + m + ' (' + wd + ')';
        }

        function relativeFromNow(d) {
            var diff = d.getTime() - Date.now();
            var sec = Math.floor(diff / 1000);
            if (sec < 60)  return '即将执行';
            var min = Math.floor(sec / 60);
            if (min < 60)  return min + ' 分钟后';
            var hr = Math.floor(min / 60);
            if (hr < 24)   return hr + ' 小时 ' + (min % 60) + ' 分后';
            var day = Math.floor(hr / 24);
            return day + ' 天 ' + (hr % 24) + ' 小时后';
        }

        // ===== 人类可读描述生成 =====
        function rangeToText(values, type) {
            var arr = Array.from(values).sort(function (a, b) { return a - b; });
            if (type === 'weekday') {
                return arr.map(function (n) { return WEEKDAY_NAMES[n]; }).join('、');
            }
            if (type === 'month') {
                return arr.map(function (n) { return MONTH_NAMES[n - 1]; }).join('、');
            }
            return arr.join('、');
        }

        function describeCron(parts) {
            var minute = parts[0];
            var hour   = parts[1];
            var day    = parts[2];
            var month  = parts[3];
            var weekday = parts[4];

            // 常见组合的快捷描述
            if (minute === '*' && hour === '*' && day === '*' && month === '*' && weekday === '*') {
                return '每<strong>分钟</strong>执行一次';
            }
            if (minute === '0' && hour === '*' && day === '*' && month === '*' && weekday === '*') {
                return '每<strong>小时</strong>整点执行';
            }
            if (minute === '0' && hour === '0' && day === '*' && month === '*' && weekday === '*') {
                return '每天<strong>午夜 00:00</strong> 执行';
            }
            if (minute === '0' && hour === '0' && day === '*' && month === '*' && weekday === '0') {
                return '每个<strong>星期日</strong>午夜执行';
            }
            if (minute === '0' && hour === '0' && day === '1' && month === '*' && weekday === '*') {
                return '每月 <strong>1 号</strong> 00:00 执行';
            }
            if (minute === '0' && hour === '0' && day === '1' && month === '1' && weekday === '*') {
                return '每年 <strong>1 月 1 日</strong> 00:00 执行';
            }

            // 一般性描述
            var segs = [];

            // 分钟段
            if (minute === '*') {
                segs.push('每分钟');
            } else if (/^\*\/\d+$/.test(minute)) {
                segs.push('每 ' + minute.split('/')[1] + ' 分钟');
            } else {
                segs.push('第 ' + minute + ' 分钟');
            }

            // 小时段
            if (hour !== '*') {
                if (/^\*\/\d+$/.test(hour)) {
                    segs.push('每 ' + hour.split('/')[1] + ' 小时');
                } else {
                    segs.push(hour + ' 时');
                }
            }

            // 日期
            if (day !== '*') {
                segs.push('日期为 ' + day);
            }

            // 月份
            if (month !== '*') {
                try {
                    var ms = parseField(month, 1, 12);
                    segs.push(rangeToText(ms, 'month') + '份');
                } catch (e) { segs.push(month + ' 月'); }
            }

            // 星期
            if (weekday !== '*') {
                try {
                    var ws = parseField(weekday, 0, 6);
                    segs.push(rangeToText(ws, 'weekday'));
                } catch (e) { segs.push('星期 ' + weekday); }
            }

            return segs.join(' · ');
        }

        // ===== 渲染 =====
        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('is-show');
            inputEl.classList.add('is-error');
            inputEl.classList.remove('is-ok');
            resultEl.classList.remove('is-show');
            copyBtn.disabled = true;
        }

        function clearError() {
            errorEl.classList.remove('is-show');
            inputEl.classList.remove('is-error');
        }

        function renderResult(parts) {
            clearError();
            inputEl.classList.add('is-ok');

            descEl.innerHTML = describeCron(parts);

            var fields = [];
            for (var i = 0; i < 5; i++) {
                var r = FIELD_RANGES[i];
                fields.push(parseField(parts[i], r.min, r.max));
            }
            var runs = getNextRuns(fields, 5);
            if (runs.length === 0) {
                nextListEl.innerHTML =
                    '<li class="ceg-next-item"><span class="ceg-next-time">未来一年无匹配</span></li>';
            } else {
                nextListEl.innerHTML = runs.map(function (d, i) {
                    return '<li class="ceg-next-item">' +
                        '<span class="ceg-next-idx">' + (i + 1) + '</span>' +
                        '<span class="ceg-next-time">' + formatDate(d) + '</span>' +
                        '<span class="ceg-next-rel">' + relativeFromNow(d) + '</span>' +
                        '</li>';
                }).join('');
            }

            resultEl.classList.add('is-show');
            copyBtn.disabled = false;
        }

        function parseNow() {
            var v = inputEl.value;
            var r = validateCron(v);
            if (!r.ok) {
                showError(r.error);
                return;
            }
            renderResult(r.parts);
        }

        function setCron(c) {
            inputEl.value = c;
            parseNow();
        }

        // ===== 事件绑定 =====
        parseBtn.addEventListener('click', parseNow);

        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                parseNow();
            }
        });

        // 输入实时清错(失焦时不自动解析,避免干扰)
        inputEl.addEventListener('input', function () {
            clearError();
        });

        copyBtn.addEventListener('click', function () {
            var text = inputEl.value.trim();
            if (!text) return;
            var done = function () {
                var orig = copyBtn.textContent;
                copyBtn.textContent = '已复制 ✓';
                copyBtn.disabled = true;
                setTimeout(function () {
                    copyBtn.textContent = orig;
                    copyBtn.disabled = false;
                }, 1500);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(done, function () {
                    fallbackCopy(text); done();
                });
            } else {
                fallbackCopy(text); done();
            }
        });

        function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(ta);
        }

        clearBtn.addEventListener('click', function () {
            inputEl.value = '';
            inputEl.classList.remove('is-error', 'is-ok');
            errorEl.classList.remove('is-show');
            resultEl.classList.remove('is-show');
            copyBtn.disabled = true;
            inputEl.focus();
        });

        // 预设卡片 + chip 统一处理
        function bindTrigger(el) {
            el.addEventListener('click', function () {
                var c = el.getAttribute('data-cron');
                if (c) setCron(c);
            });
        }
        presetCards.forEach(bindTrigger);
        chips.forEach(bindTrigger);

        // 首次进入页面不自动解析(避免无意义弹错),只设置 placeholder 即可
        // 如需预填示例,取消下行注释:
        // setCron('*/5 * * * *');
    })();
    </script>
</div>
