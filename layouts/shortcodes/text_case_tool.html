{{ $id := .Get "id" | default "textcase" }}
<div class="tool-container" id="{{ $id }}-tool">
    <div class="tool-header">
        <h3>{{ i18n "case_title" }}</h3>
        <p class="tool-desc">{{ i18n "case_desc" }}</p>
    </div>

    <div class="tool-workspace">
        <div class="tool-input-group">
            <label for="{{ $id }}-input">{{ i18n "label_input" }}</label>
            <textarea id="{{ $id }}-input" placeholder="{{ i18n "case_input_ph" }}"></textarea>
        </div>

        <div class="tool-options">
            <div class="option-item"><input type="radio" id="{{ $id }}-upper" name="{{ $id }}-mode" value="upper"><label for="{{ $id }}-upper">{{ i18n "case_upper" }}</label></div>
            <div class="option-item"><input type="radio" id="{{ $id }}-lower" name="{{ $id }}-mode" value="lower"><label for="{{ $id }}-lower">{{ i18n "case_lower" }}</label></div>
            <div class="option-item"><input type="radio" id="{{ $id }}-title" name="{{ $id }}-mode" value="title"><label for="{{ $id }}-title">{{ i18n "case_title_case" }}</label></div>
            <div class="option-item"><input type="radio" id="{{ $id }}-camel" name="{{ $id }}-mode" value="camel"><label for="{{ $id }}-camel">{{ i18n "case_camel" }}</label></div>
            <div class="option-item"><input type="radio" id="{{ $id }}-snake" name="{{ $id }}-mode" value="snake"><label for="{{ $id }}-snake">{{ i18n "case_snake" }}</label></div>
            <div class="option-item"><input type="radio" id="{{ $id }}-kebab" name="{{ $id }}-mode" value="kebab"><label for="{{ $id }}-kebab">{{ i18n "case_kebab" }}</label></div>
        </div>

        <div class="tool-actions">
            <button id="{{ $id }}-convert" class="btn-primary">{{ i18n "btn_convert" }}</button>
            <button id="{{ $id }}-clear" class="btn-secondary">{{ i18n "btn_clear" }}</button>
        </div>

        <div class="tool-output-group">
            <label for="{{ $id }}-output">{{ i18n "label_result" }}</label>
            <textarea id="{{ $id }}-output" readonly placeholder="{{ i18n "result_ph" }}"></textarea>
        </div>
        
        <div id="{{ $id }}-status" class="tool-status"></div>
    </div>
</div>

<style>
/* 样式保持不变 */
.tool-container { background: var(--code-bg); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border); margin: 1rem 0; }
.tool-header { margin-bottom: 1rem; }
.tool-header h3 { margin: 0 0 0.5rem 0; color: var(--primary); }
.tool-desc { margin: 0; font-size: 0.9rem; color: var(--secondary); }
.tool-workspace { display: flex; flex-direction: column; gap: 1rem; }
.tool-input-group, .tool-output-group { display: flex; flex-direction: column; gap: 0.5rem; }
.tool-input-group label, .tool-output-group label { font-weight: bold; font-size: 0.9rem; }
textarea { width: 100%; min-height: 120px; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; background: var(--entry); color: var(--primary); font-family: monospace; resize: vertical; box-sizing: border-box; }
textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
.tool-options { display: flex; flex-wrap: wrap; gap: 1rem; background: var(--entry); padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); }
.option-item { display: flex; align-items: center; gap: 0.3rem; }
.tool-actions { display: flex; gap: 0.5rem; }
.btn-primary, .btn-secondary { padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
.btn-primary { background: var(--primary); color: var(--code-bg); }
.btn-secondary { background: var(--border); color: var(--primary); }
.btn-primary:hover, .btn-secondary:hover { opacity: 0.8; }
.tool-status { font-size: 0.85rem; min-height: 1.2em; }
.status-error { color: #ff4d4f; }
.status-success { color: #52c41a; }
</style>

<script>
(function() {
    const container = document.getElementById('{{ $id }}-tool');
    const input = document.getElementById('{{ $id }}-input');
    const output = document.getElementById('{{ $id }}-output');
    const convertBtn = document.getElementById('{{ $id }}-convert');
    const clearBtn = document.getElementById('{{ $id }}-clear');
    const status = document.getElementById('{{ $id }}-status');

    // 核心逻辑：智能分割单词
    // 作用：将 "getUserName", "user-name", "user name" 统一拆解为 ["get", "user", "name"]
    function splitWords(str) {
        // 1. 将所有的非字母数字字符（如 - _ 空格 . , 等）替换为空格
        let spacedStr = str.replace(/[^a-zA-Z0-9]/g, ' ');
        // 2. 处理驼峰命名：在 "小写字母" 和 "大写字母" 之间插入空格
        // 例如：getUserName -> get User Name
        spacedStr = spacedStr.replace(/([a-z])([A-Z])/g, '$1 $2');
        // 3. 过滤掉多余空格，转为数组
        return spacedStr.trim().split(/\s+/).filter(w => w.length > 0);
    }

    convertBtn.addEventListener('click', () => {
        const mode = container.querySelector(`input[name="{{ $id }}-mode"]:checked`).value;
        const val = input.value.trim();

        if (!val) {
            status.textContent = '{{ i18n "msg_input_required" }}';
            status.className = 'tool-status status-error';
            return;
        }

        let result = '';

        // 【修复重点】全大写和全小写：直接操作原字符串，保留所有标点和空格
        if (mode === 'upper') {
            result = val.toUpperCase();
        } else if (mode === 'lower') {
            result = val.toLowerCase();
        } else {
            // 其他模式（驼峰、下划线等）才需要拆解重组
            const words = splitWords(val);
            
            if (words.length === 0) {
                status.textContent = '{{ i18n "msg_error_format" }}';
                status.className = 'tool-status status-error';
                return;
            }

            switch (mode) {
                case 'title':
                    // 首字母大写：把所有单词的首字母转大写，然后拼接（用空格）
                    result = words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
                    break;

                case 'camel':
                    // 小驼峰：
                    // 1. 先把所有单词转首字母大写
                    const capitalizedWords = words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
                    // 2. 再把数组中第一个单词转小写
                    if (capitalizedWords.length > 0) {
                        capitalizedWords[0] = capitalizedWords[0].toLowerCase();
                    }
                    // 3. 拼接
                    result = capitalizedWords.join('');
                    break;
                
                case 'snake':
                    // 下划线：先转全小写，使用下划线拼接
                    result = words.map(w => w.toLowerCase()).join('_');
                    break;
                
                case 'kebab':
                    // 短横线：先转全小写，使用短横线拼接
                    result = words.map(w => w.toLowerCase()).join('-');
                    break;
            }
        }

        output.value = result;
        status.textContent = '{{ i18n "msg_success" }}';
        status.className = 'tool-status status-success';
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
        output.value = '';
        status.textContent = '';
        status.className = 'tool-status';
    });
})();
</script>
