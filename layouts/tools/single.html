{{ define "main" }}


<div class="container">
    
    <!-- 1. 顶部：标题 + 简介 -->
    <header class="tool-header card">
        <h1 class="tool-title">{{ .Title }}</h1>
        
        <!-- 新增：分类展示区 -->
        <div style="margin-bottom: 15px;">
            {{ if .Params.categories }}
                <span style="font-size: 0.9rem; color: var(--text-muted); margin-right: 8px;">分类：</span>
                {{ range .Params.categories }}
                    <!-- 生成分类链接，假设分类页面路径为 /categories/{分类名} -->
                    <a href="{{ "/categories/" | relURL }}{{ . | urlize }}/" 
                    style="display: inline-block; background: #eff6ff; color: var(--primary-color); padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; text-decoration: none; margin-right: 8px; margin-bottom: 4px; border: 1px solid #bfdbfe;">
                        {{ . }}
                    </a>
                {{ end }}
            {{ end }}
        </div>

        <p class="tool-intro">
            {{ .Description }}
            <br>
            <small style="color: var(--primary-color); font-weight: 500;">
                👇 请在下方上传文件或输入内容，立即开始处理。
            </small>
        </p>
    </header>

    <!-- 4. 底部：详细介绍说明 -->  
</div>
{{ end }}
