<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - WebPenson 工具箱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .offline-container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      color: #1e293b;
      font-size: 28px;
      margin-bottom: 15px;
    }
    p {
      color: #64748b;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .retry-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .retry-btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
    }
    .cached-tools {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }
    .cached-tools h3 {
      color: #475569;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .tool-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .tool-link {
      background: #f1f5f9;
      color: #2563eb;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }
    .tool-link:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>当前处于离线状态</h1>
    <p>您似乎已断开网络连接。别担心，部分工具仍可离线使用！</p>
    <button class="retry-btn" onclick="location.reload()">重新连接</button>
    
    <div class="cached-tools">
      <h3>可离线使用的工具：</h3>
      <div class="tool-links">
        <a href="/tools/json-formatter" class="tool-link">JSON 格式化</a>
        <a href="/tools/base64" class="tool-link">Base64</a>
        <a href="/tools/url" class="tool-link">URL 编解码</a>
        <a href="/tools/unix-timestamp" class="tool-link">时间戳</a>
        <a href="/tools/color-converter" class="tool-link">颜色转换</a>
      </div>
    </div>
  </div>
  
  <script>
    // 检测网络恢复
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
